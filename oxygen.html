<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Oxygen XML Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b1220;
  color:#e2e8f0;
}

/* Layout */
.layout{
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar{
  width:220px;
  background:#020617;
  border-right:1px solid #1e293b;
  padding:10px;
}

.file{
  padding:10px;
  cursor:pointer;
  font-family:'DM Mono',monospace;
  font-size:12px;
  color:#94a3b8;
}

.file:hover{
  background:#0f172a;
  color:#fff;
}

/* Viewer */
.viewer{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Toolbar */
.toolbar{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  border-bottom:1px solid #1e293b;
  background:#020617;
}

.tabs button{
  background:none;
  border:1px solid #334155;
  color:#94a3b8;
  padding:6px 14px;
  cursor:pointer;
  font-size:12px;
}

.tabs button.active{
  background:#38bdf8;
  color:#020617;
}

/* Panels */
.panel{
  display:none;
  height:100%;
}

.panel.active{
  display:block;
}

/* Author View */
#author-view{
  background:#fff;
  color:#111;
  padding:40px;
  overflow:auto;
  height:100%;
}

#author-view h1{color:#0c4a6e}
#author-view h2{color:#0369a1}
#author-view .shortdesc{
  font-style:italic;
  border-left:3px solid #0ea5e9;
  padding-left:10px;
}
#author-view pre{
  background:#f1f5f9;
  padding:10px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="file" onclick="loadXML('task.xml')">task.xml</div>
    <div class="file" onclick="loadXML('concept.xml')">concept.xml</div>
    <div class="file" onclick="loadXML('reference.xml')">reference.xml</div>
  </div>

  <!-- Viewer -->
  <div class="viewer">

    <!-- Toolbar -->
    <div class="toolbar">
      <div>Oxygen XML Viewer</div>
      <div class="tabs">
        <button class="active" onclick="switchView('xml', this)">XML</button>
        <button onclick="switchView('author', this)">Author</button>
      </div>
    </div>

    <!-- XML Panel -->
    <div id="panel-xml" class="panel active">
      <div id="xml-editor" style="height:100%"></div>
    </div>

    <!-- Author Panel -->
    <div id="panel-author" class="panel">
      <div id="author-view"></div>
    </div>

  </div>

</div>

<script>
function switchView(view, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));

  document.getElementById('panel-' + view).classList.add('active');
  btn.classList.add('active');
}
</script>

<script>
let editor = CodeMirror(document.getElementById("xml-editor"), {
  mode: "application/xml",
  lineNumbers: true,
  readOnly: true
});
</script>

<script>
function loadXML(file){

  const base = "https://raw.githubusercontent.com/Selvamani1068/Portfolio/main/";

  fetch(base + file)
    .then(res => res.text())
    .then(data => {
      editor.setValue(data);
      renderAuthorView(data);
    })
    .catch(err => {
      editor.setValue("Error loading XML");
      console.error(err);
    });
}
</script>

<script>
function renderAuthorView(xmlString){

  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlString, "text/xml");

  let html = "";

  // Title
  const title = xml.querySelector("title");
  if(title) html += `<h1>${title.textContent}</h1>`;

  // Shortdesc
  const shortdesc = xml.querySelector("shortdesc");
  if(shortdesc) html += `<p class="shortdesc">${shortdesc.textContent}</p>`;

  // Sections
  xml.querySelectorAll("section").forEach(sec=>{
    const t = sec.querySelector("title");
    if(t) html += `<h2>${t.textContent}</h2>`;

    sec.querySelectorAll("p").forEach(p=>{
      html += `<p>${p.textContent}</p>`;
    });
  });

  // Steps
  const steps = xml.querySelectorAll("step");
  if(steps.length){
    html += "<ol>";
    steps.forEach(s=>{
      const cmd = s.querySelector("cmd");
      html += `<li>${cmd ? cmd.textContent : ""}</li>`;
    });
    html += "</ol>";
  }

  // Codeblocks
  xml.querySelectorAll("codeblock").forEach(cb=>{
    html += `<pre>${cb.textContent}</pre>`;
  });

  document.getElementById("author-view").innerHTML = html;
}
</script>

</body>
</html>
